upstream wb_backend {
    least_conn;
    server 127.0.0.1:3300;
}

server {
    server_name legendgames.space www.legendgames.space 95.163.226.154;

    location = /wb {
        return 302 /wb/;
    }

    location ^~ /wb/api/ {
        # Сохранение списков кластеров (automation/config) может быть крупным —
        # дефолтный nginx-лимит 1 МБ мал; держим заодно с backend-лимитом (10mb).
        client_max_body_size 10m;
        rewrite ^/wb/api/(.*)$ /api/$1 break;
        proxy_pass http://wb_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /wb/assets/ {
        alias /var/www/wb-automation/Frontend/build/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ^~ /wb/ {
        alias /var/www/wb-automation/Frontend/build/;
        try_files $uri $uri/ /wb/index.html;
    }

    location = /wb/index.html {
        alias /var/www/wb-automation/Frontend/build/index.html;
    }
}
