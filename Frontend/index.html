<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WB Automation Platform</title>
    <style>
      /* App-shell: мгновенный фон + лёгкий лоадер ДО загрузки JS-бандла, вместо белого
         экрана. React при монтировании заменяет содержимое #root, и каркас исчезает. */
      html, body { margin: 0; height: 100%; background: #f4f5f7; }
      #app-shell {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #f4f5f7;
      }
      #app-shell .app-shell__spinner {
        width: 32px; height: 32px; border-radius: 50%;
        border: 3px solid #d7dae0; border-top-color: #8b8f99;
        animation: app-shell-spin 0.8s linear infinite;
      }
      @keyframes app-shell-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-shell"><div class="app-shell__spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
